:root{
  --paper:#faf5e8; --ink:#1f1b15; --ink-2:#4a4238; --ink-3:#7a6f5f;
  --line:#e6dcc6; --line-2:#d8cbb0; --card:#fffdf6;
  --A:#c0553a; --A-soft:#e8c4b6; --A-wash:#f6e4dc;
  --B:#3aa5c0; --B-soft:#b6dce6; --B-wash:#dceef2;
  --mid:#9a8f7d; --shadow:rgba(60,45,20,.10);
  --maxw:720px;
}
@media (prefers-color-scheme: dark){
  :root{
    --paper:#1a1712; --ink:#f3ecdd; --ink-2:#cbc0ad; --ink-3:#9a8f7d;
    --line:#332c22; --line-2:#443b2d; --card:#221d16;
    --A:#e07a5f; --A-soft:#6b3527; --A-wash:#38241d;
    --B:#5cc0d6; --B-soft:#265863; --B-wash:#16333a;
    --mid:#8a7f6d; --shadow:rgba(0,0,0,.35);
  }
}
:root[data-theme="light"]{
  --paper:#faf5e8; --ink:#1f1b15; --ink-2:#4a4238; --ink-3:#7a6f5f;
  --line:#e6dcc6; --line-2:#d8cbb0; --card:#fffdf6;
  --A:#c0553a; --A-soft:#e8c4b6; --A-wash:#f6e4dc;
  --B:#3aa5c0; --B-soft:#b6dce6; --B-wash:#dceef2;
  --mid:#9a8f7d; --shadow:rgba(60,45,20,.10);
}
:root[data-theme="dark"]{
  --paper:#1a1712; --ink:#f3ecdd; --ink-2:#cbc0ad; --ink-3:#9a8f7d;
  --line:#332c22; --line-2:#443b2d; --card:#221d16;
  --A:#e07a5f; --A-soft:#6b3527; --A-wash:#38241d;
  --B:#5cc0d6; --B-soft:#265863; --B-wash:#16333a;
  --mid:#8a7f6d; --shadow:rgba(0,0,0,.35);
}

#gap-scan-app *{box-sizing:border-box;}
#gap-scan-app{
  font-family:"IBM Plex Sans",system-ui,-apple-system,sans-serif;
  color:var(--ink); background:var(--paper);
  line-height:1.6; -webkit-font-smoothing:antialiased;
  padding:clamp(16px,4vw,40px) clamp(14px,4vw,32px) 64px;
  max-width:100%;
  font-size:clamp(1.05rem,2.2vw,1.15rem);
}
#gap-scan-app .wrap{max-width:var(--maxw); margin:0 auto;}

/* ---- typography ---- */
#gap-scan-app h1,#gap-scan-app h2,#gap-scan-app h3{line-height:1.15; margin:0; font-weight:600; text-wrap:balance;}
#gap-scan-app h1{font-size:clamp(1.9rem,5vw,2.7rem); letter-spacing:-.015em;}
#gap-scan-app h2{font-size:clamp(1.35rem,3.6vw,1.8rem); letter-spacing:-.01em;}
#gap-scan-app h3{font-size:1.05rem; font-weight:600;}
#gap-scan-app p{margin:0;}
#gap-scan-app .lead{font-size:clamp(1.14rem,2.7vw,1.32rem); color:var(--ink-2); line-height:1.55;}
#gap-scan-app .fine{font-size:.95rem; color:var(--ink-3);}
#gap-scan-app .eyebrow{
  font-family:"IBM Plex Mono",ui-monospace,monospace; font-weight:500;
  font-size:.72rem; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-3);
}
#gap-scan-app .time-est{
  display:flex; flex-wrap:wrap; gap:8px 18px; align-items:baseline;
  font-size:.92rem; color:var(--ink-3); margin:.2rem 0 .3rem;
}
#gap-scan-app .time-est .te{display:flex; gap:7px; align-items:baseline;}
#gap-scan-app .time-est .te b{font-family:"IBM Plex Mono",monospace; font-weight:600; color:var(--ink-2); font-size:.98rem;}
#gap-scan-app .time-est .te span{font-size:.86rem;}
#gap-scan-app .time-est .te-sep{color:var(--line-2);}
#gap-scan-app em{font-style:italic;}
#gap-scan-app strong{font-weight:600; color:var(--ink);}
#gap-scan-app .hand{font-family:"Kalam",cursive;}

/* ---- stack spacing ---- */
#gap-scan-app .stack>*+*{margin-top:1.15rem;}
#gap-scan-app .stack-sm>*+*{margin-top:.6rem;}
#gap-scan-app .panel{display:none;}
#gap-scan-app .panel.active{display:block; animation:fade .4s ease;}
@keyframes fade{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}
@media (prefers-reduced-motion:reduce){
  #gap-scan-app .panel.active{animation:none;}
  #gap-scan-app *{transition:none!important;}
}

/* ---- progress ---- */
#gap-scan-app .progress-head{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:.5rem; gap:12px;}
#gap-scan-app .progress-rail{height:7px; background:var(--line); border-radius:99px; overflow:hidden; position:relative;}
#gap-scan-app .progress-fill{height:100%; width:0%; background:var(--ink-3); border-radius:99px; transition:width .4s cubic-bezier(.2,.7,.3,1);}
#gap-scan-app .progress-fill.past-min{background:linear-gradient(90deg,var(--A),var(--B));}
#gap-scan-app .progress-min-tick{position:absolute; top:-3px; bottom:-3px; width:2px; background:var(--ink-2); opacity:.5;}

/* ---- buttons ---- */
#gap-scan-app button{
  font-family:inherit; font-size:1rem; cursor:pointer; color:var(--ink);
  background:var(--card); border:1px solid var(--line-2); border-radius:10px;
  padding:.7em 1.1em; transition:border-color .15s, background .15s, transform .05s;
}
#gap-scan-app button:hover{border-color:var(--ink-3);}
#gap-scan-app button:active{transform:translateY(1px);}
#gap-scan-app button:focus-visible{outline:2px solid var(--B); outline-offset:2px;}
#gap-scan-app button:disabled{opacity:.4; cursor:not-allowed;}
#gap-scan-app .btn-primary{background:var(--ink); color:var(--paper); border-color:var(--ink); font-weight:500;}
#gap-scan-app .btn-primary:hover{background:var(--ink-2); border-color:var(--ink-2);}
#gap-scan-app .btn-row{display:flex; flex-wrap:wrap; gap:10px; align-items:center;}
#gap-scan-app .link-btn{background:none; border:none; padding:.3em 0; color:var(--ink-3); text-decoration:underline; text-underline-offset:3px; font-size:.9rem;}
#gap-scan-app .link-btn:hover{color:var(--ink);}

/* ---- question card ---- */
#gap-scan-app .qcard{
  background:var(--card); border:1px solid var(--line); border-radius:16px;
  padding:clamp(18px,4vw,30px); box-shadow:0 1px 3px var(--shadow);
}
#gap-scan-app .qcard.keying{border-color:var(--ink-3); box-shadow:0 4px 18px var(--shadow);}
#gap-scan-app .q-kicker{display:flex; gap:10px; align-items:center; margin-bottom:1rem; flex-wrap:wrap;}
#gap-scan-app .chip{
  font-family:"IBM Plex Mono",monospace; font-size:.66rem; letter-spacing:.1em; text-transform:uppercase;
  padding:.28em .6em; border-radius:6px; background:var(--line); color:var(--ink-3); font-weight:500;
}
#gap-scan-app .chip.ev-artefact{background:var(--A-wash); color:var(--A);}
#gap-scan-app .chip.ev-stress{background:#f0e6d0; color:#a5762f;}
#gap-scan-app .q-stem{font-size:clamp(1.28rem,3vw,1.55rem); font-weight:500; line-height:1.32; margin-bottom:1.4rem;}

/* ---- options ---- */
#gap-scan-app .opts{display:flex; flex-direction:column; gap:10px;}
#gap-scan-app .opt{
  display:flex; gap:14px; align-items:flex-start; text-align:left; width:100%;
  padding:1em 1.15em; border-radius:12px; background:var(--paper); border:1.5px solid var(--line-2);
  line-height:1.4; font-size:1.1rem;
}
#gap-scan-app .opt:hover{border-color:var(--ink-3);}
#gap-scan-app .opt .key{
  flex:0 0 auto; width:26px; height:26px; border-radius:7px; display:grid; place-items:center;
  font-family:"IBM Plex Mono",monospace; font-size:.8rem; font-weight:600;
  background:var(--card); border:1px solid var(--line-2); color:var(--ink-3);
}
#gap-scan-app .opt .otext{flex:1 1 auto; padding-top:1px;}
/* NEUTRAL selected state — identical for both poles so nothing signals which pole an option is */
#gap-scan-app .opt.pole-pick[aria-pressed="true"]{border-color:var(--ink); background:var(--paper-deep,var(--line));}
#gap-scan-app .opt.pole-pick[aria-pressed="true"] .key{background:var(--ink); border-color:var(--ink); color:var(--paper);}
#gap-scan-app .opt.pole-mid[aria-pressed="true"]{border-color:var(--ink-2); background:var(--line);}
#gap-scan-app .opt.pole-mid[aria-pressed="true"] .key{background:var(--ink-2); border-color:var(--ink-2); color:var(--paper);}
#gap-scan-app .opt.mid{font-size:.92rem; color:var(--ink-2);}

/* ---- keyboard hint ---- */
#gap-scan-app .kbd-hint{
  margin-top:1.1rem; font-family:"IBM Plex Mono",monospace; font-size:.74rem; color:var(--ink-3);
  display:flex; gap:14px; flex-wrap:wrap; align-items:center;
}
#gap-scan-app .kbd-hint kbd{
  font-family:inherit; background:var(--line); border:1px solid var(--line-2); border-bottom-width:2px;
  border-radius:5px; padding:.1em .45em; font-size:.9em; color:var(--ink-2);
}

/* ---- result board ---- */
#gap-scan-app .board{margin-top:1.4rem; display:flex; flex-direction:column; gap:2px;}
#gap-scan-app .brow{padding:.7rem .2rem; border-bottom:1px solid var(--line);}
#gap-scan-app .brow:last-child{border-bottom:none;}
#gap-scan-app .brow-head{display:flex; justify-content:space-between; align-items:baseline; gap:10px; margin-bottom:.5rem;}
#gap-scan-app .brow-title{font-weight:600; font-size:.98rem;}
#gap-scan-app .brow-gap{font-family:"IBM Plex Mono",monospace; font-size:.76rem; color:var(--ink-3); white-space:nowrap;}
#gap-scan-app .brow-gap.material{color:var(--ink);}
#gap-scan-app .track{position:relative; height:30px; margin:1.15rem 0 .1rem;}
#gap-scan-app .track-line{position:absolute; top:50%; left:0; right:0; height:2px; background:var(--line-2); transform:translateY(-50%);}
/* pole labels sit ABOVE the track so they never collide with the band or marker */
#gap-scan-app .track-pole{position:absolute; bottom:calc(100% + 3px); font-family:"IBM Plex Mono",monospace; font-size:.58rem; letter-spacing:.05em; text-transform:uppercase; color:var(--ink-3); white-space:nowrap; max-width:46%; overflow:hidden; text-overflow:ellipsis;}
#gap-scan-app .track-pole.a{left:0;}
#gap-scan-app .track-pole.b{right:0; text-align:right;}
#gap-scan-app .track-pole .arrow{opacity:.55;}
/* the leader band */
#gap-scan-app .you-band{position:absolute; top:50%; height:16px; transform:translateY(-50%); border-radius:8px; background:linear-gradient(90deg,var(--A-soft),var(--B-soft)); opacity:.9; border:1px solid var(--line-2);}
#gap-scan-app .you-dot{position:absolute; top:50%; width:13px; height:13px; border-radius:50%; transform:translate(-50%,-50%); background:var(--ink); border:2px solid var(--card); z-index:3;}
/* the situation demand marker */
#gap-scan-app .demand-mark{position:absolute; top:50%; width:0; height:28px; transform:translate(-1.5px,-50%); border-left:3px dashed var(--ink); z-index:4;}
#gap-scan-app .demand-band{position:absolute; top:50%; height:28px; transform:translateY(-50%); border-radius:4px; border:2px dashed var(--ink-2); background:transparent; z-index:2;}
#gap-scan-app .brow-read{font-size:.84rem; color:var(--ink-2); margin-top:.35rem;}
#gap-scan-app .brow-read .poleword{font-weight:600;}
#gap-scan-app .brow-gloss{font-size:.76rem; color:var(--ink-3); margin-top:3px; line-height:1.4;}

/* legend */
#gap-scan-app .legend{display:flex; flex-wrap:wrap; gap:16px 22px; margin:1rem 0 .2rem; font-size:.82rem; color:var(--ink-2);}
#gap-scan-app .legend .lg{display:flex; gap:8px; align-items:center;}
#gap-scan-app .lg .swatch-band{width:26px; height:12px; border-radius:6px; background:linear-gradient(90deg,var(--A-soft),var(--B-soft)); border:1px solid var(--line-2);}
#gap-scan-app .lg .swatch-dot{width:12px; height:12px; border-radius:50%; background:var(--ink); border:2px solid var(--card);}
#gap-scan-app .lg .swatch-mark{width:0; height:16px; border-left:2.5px dashed var(--ink-2);}

/* callout / interpretive */
#gap-scan-app .callout{background:var(--card); border:1px solid var(--line); border-left:3px solid var(--ink-3); border-radius:0 12px 12px 0; padding:1rem 1.2rem; margin-top:1.1rem;}
#gap-scan-app .callout.dom-a{border-left-color:var(--A);}
#gap-scan-app .callout.dom-b{border-left-color:var(--B);}
#gap-scan-app .interp{font-size:1.02rem; color:var(--ink-2); margin-top:1.4rem;}

/* confidence banner */
#gap-scan-app .conf-banner{display:flex; flex-wrap:wrap; gap:12px; align-items:flex-start; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:.9rem 1.1rem; margin-top:1rem; font-size:.9rem; color:var(--ink-2);}
#gap-scan-app .conf-banner .cb-icon{font-family:"IBM Plex Mono",monospace; color:var(--ink-3); font-size:1.1rem; line-height:1.2;}

/* invitation */
#gap-scan-app .invite{margin-top:2.2rem; padding-top:1.8rem; border-top:1px solid var(--line-2);}
#gap-scan-app .invite h2{margin-bottom:.6rem;}

/* domain pill on result */
#gap-scan-app .dompill{display:inline-block; font-family:"IBM Plex Mono",monospace; font-size:.72rem; letter-spacing:.08em; text-transform:uppercase; padding:.3em .7em; border-radius:7px; background:var(--line); color:var(--ink-2); font-weight:500;}

/* stop control */
#gap-scan-app .stop-bar{display:flex; justify-content:space-between; align-items:center; gap:12px; margin-top:1.3rem; flex-wrap:wrap;}
#gap-scan-app .stop-note{font-size:.82rem; color:var(--ink-3);}

/* condition options are plain numbered */
#gap-scan-app .opt.cond .key{background:var(--card);}
#gap-scan-app .opt.cond[aria-pressed="true"]{border-color:var(--ink); background:var(--line);}
#gap-scan-app .opt.cond[aria-pressed="true"] .key{background:var(--ink); border-color:var(--ink); color:var(--paper);}
</style>

<div id="gap-scan-app">
<div class="wrap">

  <!-- ============ INTRO ============ -->
  <section class="panel active" id="p-intro" data-panel="intro">
    <div class="stack">
      <div>
        
        <h1 id="introHead"></h1>
      </div>
      <p class="lead" id="introLead"></p>
      <div class="stack-sm">
        <p id="introFit"></p>
        <p id="introHonest"></p>
        <p id="introPair"></p>
        <p id="introWho"></p>
      </div>
      <div class="time-est" id="introTime"></div>
      <p class="fine" id="introPrivacy"></p>
      <div class="btn-row" style="margin-top:.4rem;">
        <button class="btn-primary" id="startBtn">Begin →</button>
      </div>
    </div>
  </section>

  <!-- ============ SITUATION (adaptive Cynefin) ============ -->
  <section class="panel" id="p-situation" data-panel="situation">
    <div class="stack">
      <div>
        <p class="eyebrow" id="sitEyebrow">Part one: the situation</p>
        <h2 id="sitHead"></h2>
        <p class="lead" id="sitLead" style="margin-top:.5rem;"></p>
      </div>
      <div>
        <div class="progress-head">
          <span class="fine" id="sitProgLabel"></span>
          <span class="fine" id="sitProgCount"></span>
        </div>
        <div class="progress-rail"><div class="progress-fill" id="sitProgFill"></div></div>
      </div>
      <div class="qcard" id="sitCard"></div>
      <div class="stop-bar">
        <button class="link-btn" id="sitBackBtn" style="visibility:hidden;">← back</button>
        <span></span>
      </div>
      <p class="fine" id="sitFine"></p>
    </div>
  </section>

  <!-- ============ PARADIGM FEED (adaptive) ============ -->
  <section class="panel" id="p-feed" data-panel="feed">
    <div class="stack">
      <div>
        <p class="eyebrow">Part two: your instincts</p>
        <h2 id="feedHead"></h2>
      </div>
      <div>
        <div class="progress-head">
          <span class="fine" id="feedProgLabel"></span>
          <span class="fine" id="feedProgCount"></span>
        </div>
        <div class="progress-rail">
          <div class="progress-fill" id="feedProgFill"></div>
          <div class="progress-min-tick" id="feedMinTick"></div>
        </div>
      </div>
      <div class="qcard" id="feedCard"></div>
      <div class="stop-bar">
        <button class="link-btn" id="feedBackBtn" style="visibility:hidden;">← previous</button>
        <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
          <span class="stop-note" id="feedStopNote"></span>
          <button class="btn-primary" id="seeResultBtn" disabled>See my result →</button>
        </div>
      </div>
    </div>
  </section>

  <!-- ============ RESULT ============ -->
  <section class="panel" id="p-result" data-panel="result">
    <div class="stack">
      <div>
        <span class="dompill" id="resDomPill"></span>
        <h2 id="resHead" style="margin-top:.7rem;"></h2>
        <p class="lead" id="resSub" style="margin-top:.5rem;"></p>
      </div>

      <div class="conf-banner" id="resConf">
        <span class="cb-icon">±</span>
        <span id="resConfText" style="flex:1 1 24ch;"></span>
        <button class="link-btn" id="resMoreBtn" style="margin-left:auto; align-self:center; white-space:nowrap;">Answer more →</button>
      </div>

      <div>
        <h3 style="margin-bottom:.2rem;" id="resBoardHead"></h3>
        <div class="legend" id="resLegend"></div>
        <div class="board" id="resBoard"></div>
      </div>

      <div id="resCallouts"></div>
      <p class="interp" id="resInterp"></p>

      <!-- invitation -->
      <div class="btn-row" style="margin-top:1.1rem;">
        <button class="link-btn" id="againBtn"></button>
      </div>

      <p class="fine" id="resDisclaimer" style="margin-top:2rem;"></p>
    </div>
  </section>

</div>
</div>

s from the standard","poleB_gloss":"real work adjusts; the gap holds the risk","situationStem":"What did this situation actually call for?","situationA":"holding the standard: a real breach needed addressing","situationB":"examining conditions: the work-as-done had drifted from the plan","items":[{"evidence_type":"reflex","stem":"At the last post-incident review, my opening question was mostly…","optA":"which step was missed, and where did we depart from the standard?","optB":"what surprised you, and where did you improvise?"},{"evidence_type":"stress","stem":"The last time an outage hit and pressure spiked, I moved to…","optA":"add an approval gate, tighten change-control, clarify the rule","optB":"send someone below the line to learn the real work"},{"evidence_type":"attention","stem":"In our reviews, I get most uneasy when…","optA":"we close with no clear cause and no owner for the fix","optB":"the story fits too cleanly and everyone feels resolved"},{"evidence_type":"artefact","stem":"The last corrective action I wrote out of an incident was built to…","optA":"retrain the person, tighten the procedure, and check that both hold","optB":"change the conditions people were operating within"}]},{"axis":"leader-follower-vs-leader-leader","chapter":17,"short":"Leader-follower / leader-leader","title":"Where the decisions live","poleA":"Leader-follower","poleB":"Leader-leader","poleA_gloss":"authority sits with the senior person; others seek permission","poleB_gloss":"authority lives where the information lives; others state intent","situationStem":"What did this situation actually call for?","situationA":"centralised calls: the decision genuinely needed the senior view","situationB":"distributed authority: the information sat with the team, not you","items":[{"evidence_type":"reflex","stem":"The last non-trivial decision that reached me arrived because…","optA":"it was the kind of call I keep at my level, by design","optB":"someone told me their intent and I said 'Very rocedural or role redesign was blocked by regulation inside the horizon","situationB":"when the work was complex, competitors were redesigning, and consequences would arrive in months","items":[{"evidence_type":"reflex","stem":"The last time I brought AI into a team, my first move was to…","optA":"ask which existing roles it could speed up and by how much","optB":"ask which of the team's work is now human, supervised, or autonomous"},{"evidence_type":"stress","stem":"The last time an AI deployment underperformed, what I actually did was…","optA":"dig into where adoption stalled and fix training, workflow fit, and targets in the same roles","optB":"treat it as a sign the roles and hand-offs around it needed redrawing"},{"evidence_type":"attention","stem":"In the past quarter, the AI numbers I kept returning to were…","optA":"productivity uplift, hours saved per role, adoption against peer benchmarks","optB":"whether the team got broader mandates and fewer hand-offs"},{"evidence_type":"artefact","stem":"The last hiring plan I signed off after adopting AI…","optA":"backfilled the same specialist roles, each now boosted by AI tools","optB":"shifted toward fewer generalists who define outcomes and direct the AI"}]},{"axis":"utilisation-vs-flow","chapter":4,"short":"Utilisation / flow","title":"The busy trap","poleA":"Utilisation","poleB":"Flow","poleA_gloss":"keeps everyone busy and treats idle capacity as waste","poleB_gloss":"protects slack and fast throughput, accepting deliberate idle time","situationStem":"What did this situation actually call for?","situationA":"when the work was routine, high-volume, and ran to a stable specification","situationB":"when the work was heterogeneous, ambiguous, or learning-heavy","items":[{"evidence_type":"reflex","stem":"The last time I planned a team's quarter, my first move with each person's calendar was to…","optA":"fill it close to fully booked, so every scarce hour was spoken for going into the quarter","optB":"leave a visible ery was slipping and pressure was on, I…","optA":"held each function to its own utilisation and throughput targets, each lead owning their own recovery.","optB":"pulled people off non-critical work to serve the bottleneck, even where their own numbers dipped."},{"evidence_type":"attention","stem":"In the past month, the thing I watched most closely was…","optA":"whether each function was fully booked and moving the numbers it owned.","optB":"where work was piling up between teams, and which single step set the pace."},{"evidence_type":"artefact","stem":"The last structural change I made in a multi-stage flow was built to…","optA":"give every team enough capacity and authority to hit its own targets.","optB":"tune each team’s capacity and hand-offs to serve the step that set the overall pace."}]},{"axis":"attached-to-outcome-vs-attached-to-inquiry","chapter":10,"short":"Outcome / inquiry","title":"The failed decision","poleA":"Attached to outcome","poleB":"Attached to inquiry","poleA_gloss":"defends the decision as a commitment that had to hold","poleB_gloss":"treats the decision as a hypothesis the outcome tested","situationStem":"What did this situation actually call for?","situationA":"a public commitment to investors, a regulator, or a signed scope that had to be held","situationB":"a decision made under uncertainty that was really a hypothesis dressed as a commitment","items":[{"evidence_type":"reflex","stem":"The last time a decision I'd backed clearly missed, my first move in the room was to…","optA":"walk through what we knew at the time, to show the call was sound when we made it","optB":"ask what the miss told us and what we'd hold differently next time"},{"evidence_type":"stress","stem":"When the metrics turned against a strategy I'd committed to publicly, over the following weeks I…","optA":"held the position, tightened execution, and gave the strategy time to come through","optB":"named the change out loud and reframed it as a pivot on validated learning const $ = id => document.getElementById(id);
function showPanel(name){
  document.querySelectorAll('#gap-scan-app .panel').forEach(p=>p.classList.toggle('active', p.dataset.panel===name));
  state.phase = name;
  window.scrollTo({top:0, behavior:'smooth'});
}
function paradigmByAxis(ax){ return PARADIGMS.find(p=>p.axis===ax); }
function itemOf(key){
  const [ax,ev]=key.split('|'); const p=paradigmByAxis(ax);
  return {p, item:p.items.find(i=>i.evidence_type===ev), ev};
}
// Deterministic per-question coin-flip for which pole shows on top. No Math.random (keeps the
// order stable within a session and reproducible for tests); the hash of the key string decides.
function hashStr(s){ let h=2166136261; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }
function poleOnTop(key){ return (hashStr(key)&1)===0; }   // true -> poleA on top for this question

/* ============================================================
   SITUATION PHASE (adaptive Cynefin)
   ============================================================ */
// deterministic order: keep author order (already curated). Adaptive stop when confident.
function initSituation(){
  state.sitOrder = CONDS.map((_,i)=>i);
  state.sitPos = 0; state.sitAnswers = []; state.domain = null;
}
// tally domains; return {top, topN, second, secondN, central, aporetic, confused, total}
function sitTally(){
  const v={};
  state.sitAnswers.forEach(a=>{ v[a.domain]=(v[a.domain]||0)+1; });
  const decided = ['clear','complicated','complex','chaotic'];
  let top=null,topN=0,second=null,secondN=0;
  decided.forEach(d=>{ const n=v[d]||0; if(n>topN){second=top;secondN=topN;top=d;topN=n;} else if(n>secondN){second=d;secondN=n;} });
  return {v, top, topN, second, secondN,
          aporetic:v.aporetic||0, confused:v.confused||0,
          central:(v.aporetic||0)+(v.confused||0), total:state.sitAnswers.length};
}
// classify final domain (mirrors v8 logic)
function classifyDomain(){
  const t=sitTally();
  const centralFloor=Math.max(3, Math.ceil(CONDS.length/4));
  if(t.central>=t.topN && t.central>=centralFloor){
    return t.aporetic>t.confused ? 'aporetic' : 'confused';
  }
  return t.top || 'complicated';
}
// adaptive stop: enough answered AND a clear leader, OR ran out of questions
function situationConfident(){
  const t=sitTally();
  const minSit=4;                       // never stop before 4
  if(t.total < minSit) return false;
  if(t.total >= CONDS.length) return true;
  // central-signal path: if central is already at/above floor and leads, we can stop
  const centralFloor=Math.max(3, Math.ceil(CONDS.length/4));
  if(t.central>=centralFloor && t.central>=t.topN) return true;
  // decided path: leader has a 2+ margin over runner-up and >=3 votes
  if(t.topN>=3 && (t.topN - t.secondN)>=2) return true;
  return false;
}
function renderSituation(){
  const qi = state.sitOrder[state.sitPos];
  const q = CONDS[qi];
  const answered = state.sitAnswers.length;
  // progress: fraction toward "confident", but cap display sensibly
  const denom = Math.min(CONDS.length, 8);
  const pct = Math.min(100, Math.round((answered/denom)*100));
  $('sitProgFill').style.width = pct+'%';
  $('sitProgCount').textContent = answered ? answered+" answered" : "";
  $('sitProgLabel').textContent = COPY.sitProgLabel;

  // if we've navigated back to an already-answered question, restore its choice
  const prior = state.sitAnswers[state.sitPos];  // {qIdx, domain, oi} if answered
  const opts = q.options.map((o,oi)=>{
    const on = prior && prior.oi===oi;
    return `
    <button class="opt cond" data-oi="${oi}" role="radio" aria-checked="${on}" aria-pressed="${on}">
      <span class="key">${oi+1}</span><span class="otext">${o.text}</span>
    </button>`;
  }).join('');
  $('sitCard').innerHTML = `
    <p class="q-stem">${q.stem}</p>
    <div class="opts" role="radiogroup" aria-label="${q.stem}">${opts}</div>
    <div class="kbd-hint"><span><kbd>1</kbd>–<kbd>${q.options.length}</kbd> to answer</span>${state.sitPos>0?'<span style="margin-left:auto;"><kbd>⌫</kbd> back</span>':''}</div>`;
  $('sitCard').querySelectorAll('.opt').forEach(btn=>{
    btn.addEventListener('click', ()=> answerSituation(qi, parseInt(btn.dataset.oi,10)));
  });
  $('sitBackBtn').style.visibility = state.sitPos>0 ? 'visible' : 'hidden';
}
function answerSituation(qi, oi){
  const q = CONDS[qi];
  // record/overwrite the answer at this position (overwrite handles re-answering after going back)
  state.sitAnswers[state.sitPos] = {qIdx:qi, domain:q.options[oi].domain, oi};
  // if re-answering an earlier question, truncate anything after (the read may change)
  state.sitAnswers.length = state.sitPos+1;
  state.sitPos++;
  if(situationConfident() || state.sitPos>=state.sitOrder.length){
    state.domain = classifyDomain();
    startFeed();
  } else {
    renderSituation();
  }
}
function sitBack(){
  if(state.sitPos<=0) return;
  state.sitPos--;
  renderSituation();
}

/* ============================================================
   PARADIGM FEED PHASE (adaptive one-at-a-time)
   ============================================================ */
function startFeed(){
  state.feedPos = 0;
  renderFeedProgress();
  renderFeedCard();
  showPanel('feed');
}
// count axes with >= MIN_PER_AXIS answered (a "complete" axis)
function axisAnswerCounts(){
  const c={};
  Object.entries(state.answers).forEach(([k,v])=>{ if(!isEvidence(v)) return; const ax=k.split('|')[0]; c[ax]=(c[ax]||0)+1; });
  return c;
}
function reportableAxes(){
  const c=axisAnswerCounts(); return Object.keys(c).filter(ax=>c[ax]>=MIN_PER_AXIS);
}
function canReport(){
  return evidenceCount()>=MIN_TOTAL && reportableAxes().length>=3;
}
function renderFeedProgress(){
  const answered = state.answeredList.length;
  // progress toward "can report" is the min gate; then it keeps filling toward richer coverage
  const minTick = Math.round((MIN_TOTAL/ SERVE.length)*100);
  $('feedMinTick').style.left = minTick+'%';
  const pct = Math.min(100, Math.round((answered/ SERVE.length)*100));
  const fill=$('feedProgFill');
  fill.style.width = pct+'%';
  fill.classList.toggle('past-min', canReport());
  $('feedProgLabel').textContent = COPY.feedProgLabel;
  const rep=reportableAxes().length;
  $('feedProgCount').textContent = answered ? `${answered} of ${SERVE.length} reviewed · ${rep} of ${PARADIGMS.length} paradigms in view` : "";
}
function nextUnansweredPos(from){
  for(let i=from;i<SERVE.length;i++){ if(!(SERVE[i] in state.answers)) return i; }
  return -1;
}
function renderFeedCard(revisit){
  // normally advance to the next unanswered question; when revisiting (back nav),
  // render exactly at feedPos even though it's already answered.
  let pos = revisit ? state.feedPos : nextUnansweredPos(state.feedPos);
  if(pos===-1){ // everything answered
    goResult(); return;
  }
  state.feedPos = pos;
  const key = SERVE[pos];
  const {p,item,ev} = itemOf(key);
  // Randomise which pole shows on top, deterministically per question (no bias toward a fixed side,
  // and no fixed "B is always the newer pole" pattern for a leader to lock onto). aFirst=true -> poleA on top.
  const aFirst = poleOnTop(key);
  const top    = aFirst ? {c:'a', text:item.optA} : {c:'b', text:item.optB};
  const bottom = aFirst ? {c:'b', text:item.optB} : {c:'a', text:item.optA};
  // NB: colour/key follow POSITION, not pole — the selected state is neutral so nothing signals the pole.
  $('feedCard').innerHTML = `
    <p class="q-stem">${item.stem}</p>
    <div class="opts" role="radiogroup" aria-label="${item.stem}">
      <button class="opt pole-pick" data-c="${top.c}" role="radio" aria-checked="false" aria-pressed="false">
        <span class="key">1</span><span class="otext">${top.text}</span></button>
      <button class="opt pole-mid mid" data-c="mid" role="radio" aria-checked="false" aria-pressed="false">
        <span class="key">↓</span><span class="otext">Both were part of what I did</span></button>
      <button class="opt pole-pick" data-c="${bottom.c}" role="radio" aria-checked="false" aria-pressed="false">
        <span class="key">2</span><span class="otext">${bottom.text}</span></button>
      <button class="opt pole-mid mid" data-c="na" role="radio" aria-checked="false" aria-pressed="false">
        <span class="key">0</span><span class="otext">Neither fits, or there’s no recent example (leave this one out)</span></button>
    </div>
    <div class="kbd-hint">
      <span><kbd>1</kbd> top</span>
      <span><kbd>↓</kbd> both</span>
      <span><kbd>2</kbd> bottom</span>
      <span><kbd>0</kbd> leave out</span>
      <span><kbd>⌫</kbd> back</span>
      <span style="margin-left:auto;">reviewed ${state.answeredList.length}</span>
    </div>`;
  // restore prior answer highlight if re-visiting (match by pole, not position)
  const prior = state.answers[key];
  $('feedCard').querySelectorAll('.opt').forEach(btn=>{
    if(prior && btn.dataset.c===prior){ btn.setAttribute('aria-pressed','true'); btn.setAttribute('aria-checked','true'); }
    btn.addEventListener('click', ()=> answerFeed(key, btn.dataset.c));
  });
  // back is always available in the feed: either step to an earlier answer, or return to the situation read
  $('feedBackBtn').style.visibility = 'visible';
  renderFeedProgress();
  updateStopBar();
}
function answerFeed(key, choice){
  const isNew = !(key in state.answers);
  state.answers[key]=choice;
  if(isNew) state.answeredList.push(key);
  // advance
  state.feedPos = nextUnansweredPos(state.feedPos+1);
  if(state.feedPos===-1){ goResult(); return; }
  renderFeedCard();
}
function feedBack(){
  const curKey = SERVE[state.feedPos];
  const answeredPositions = state.answeredList.map(k=>SERVE.indexOf(k)).sort((a,b)=>a-b);
  // find the greatest answered position strictly before the current one
  let target=-1;
  for(const p of answeredPositions){ if(p < state.feedPos) target=p; }
  if(target>=0){
    state.feedPos = target;
    renderFeedCard(true);   // revisit: render at feedPos, don't skip past the answered question
  } else {
    // at (or before) the first answered feed question -> drop back into the situation phase
    // so the leader can revise their situation read.
    returnToSituation();
  }
}
function returnToSituation(){
  // reopen situation at its last answered question so it can be changed
  state.sitPos = Math.max(0, state.sitAnswers.length - 1);
  renderSituation();
  showPanel('situation');
}
function updateStopBar(){
  const ok=canReport();
  $('seeResultBtn').disabled = !ok;
  if(ok){
    $('feedStopNote').textContent = "Enough to read now. Keep going to tighten it, or stop here.";
  } else {
    const need = Math.max(0, MIN_TOTAL - evidenceCount());
    const repNeed = Math.max(0, 3 - reportableAxes().length);
    $('feedStopNote').textContent = need>0
      ? `A few more to read the pattern (${need} to go).`
      : `Almost there. ${repNeed} more paradigm${repNeed===1?'':'s'} need a second answer.`;
  }
}

/* ============================================================
   SCORING + RESULT
   ============================================================ */
// paradigm position = mean of answered item positions (a=15, mid=50, b=85)
function axisPosition(ax){
  const p=paradigmByAxis(ax); const vals=[];
  p.items.forEach(it=>{
    const k=ax+'|'+it.evidence_type;
    if(k in state.answers && isEvidence(state.answers[k])) vals.push(CHOICE_POS[state.answers[k]]);
  });
  if(!vals.length) return null;
  return {mean: vals.reduce((a,b)=>a+b,0)/vals.length, n:vals.length, vals};
}
// coherence: spread of answered positions on the axis. Opposite poles (a & b both present) = incoherent.
function axisCoherence(ax){
  const pos=axisPosition(ax); if(!pos) return null;
  const hasA = pos.vals.some(v=>v<CHOICE_POS.mid);
  const hasB = pos.vals.some(v=>v>CHOICE_POS.mid);
  const contradiction = hasA && hasB;                    // opposite poles answered
  const range = Math.max(...pos.vals)-Math.min(...pos.vals);
  return {contradiction, range, n:pos.n};
}
// evidence-consistency band half-width (in position units, 0..~35)
function axisBand(ax){
  const pos=axisPosition(ax); const coh=axisCoherence(ax); if(!pos) return null;
  // base: one answer -> widest (28). each additional coherent answer shaves ~7.
  let half = 30 - (pos.n-1)*7;                            // n=1 ->30, n=2 ->23, n=3 ->16, n=4 ->9
  if(coh.contradiction) half += 16;                      // opposite poles -> widen hard (Snowden patch)
  else half += Math.round(coh.range*0.12);               // mild spread widens a little
  half = Math.max(6, Math.min(34, half));
  return half;
}
// demand for an axis given the domain: point or band
function axisDemand(ax){
  const dm=DOMAINS[state.domain];
  if(dm && dm.band) return {band:dm.band};                // central domains
  const row=DEMAND[ax]; if(!row) return {point:50};
  return {point: row[state.domain] != null ? row[state.domain] : 50};
}
function domainIsCentral(){ return !!(DOMAINS[state.domain] && DOMAINS[state.domain].central); }

function computeResults(){
  const rep=reportableAxes();
  const rows = rep.map(ax=>{
    const pos=axisPosition(ax), band=axisBand(ax), dem=axisDemand(ax), coh=axisCoherence(ax);
    let gap;
    if(dem.point!=null) gap = Math.abs(pos.mean - dem.point);
    else { // band demand: gap is distance to nearest band edge, 0 if inside
      const [lo,hi]=dem.band;
      gap = pos.mean<lo ? lo-pos.mean : (pos.mean>hi ? pos.mean-hi : 0);
    }
    return {ax, p:paradigmByAxis(ax), mean:pos.mean, n:pos.n, band, dem, coh, gap};
  });
  rows.sort((a,b)=> b.gap-a.gap);
  return rows;
}
// direction of net gap across material rows (toward A = leader lags to control; toward B = runs ahead)
function netDirection(rows){
  let a=0,b=0,mat=0;
  rows.forEach(r=>{
    if(r.gap<20) return; mat++;
    const demandPos = r.dem.point!=null ? r.dem.point : (r.dem.band[0]+r.dem.band[1])/2;
    if(demandPos > r.mean) b++;        // situation wanted MORE B than leader gave -> leader lags to A
    else a++;                          // situation wanted more A -> leader ran ahead to B
  });
  return {towardB:b, towardA:a, material:mat};
}

/* ---------- result rendering ---------- */
function pctX(v){ return Math.max(0,Math.min(100,v)); }   // position 0..100 -> % across track
function goResult(){ renderResult(); showPanel('result'); }

function renderResult(){
  const rows = computeResults();
  const dom = state.domain, dm = DOMAINS[dom], central = domainIsCentral();
  const dir = netDirection(rows);
  const M = rows.length;                                   // reportable axes count
  const totalAns = evidenceCount();
  const naCount = state.answeredList.length - totalAns;
  const incoherentRows = rows.filter(r=>r.coh && r.coh.contradiction).length;

  // ---- domain pill ----
  $('resDomPill').textContent = "Read as " + dm.label;

  // ---- not enough evidence: refuse to read rather than dress up an empty report ----
  if(M<3 || totalAns<MIN_TOTAL){
    $('resHead').innerHTML = "Not enough here to <em>read you fairly.</em>";
    let why = `The scan has ${totalAns} scored answer${totalAns===1?'':'s'} across ${M} paradigm${M===1?'':'s'}, below the floor it needs before it will say anything.`;
    if(naCount>=3) why += ` You left ${naCount} prompts out as not fitting or having no recent example. If that kept happening, the scan's frame (leading a team that delivers under pressure) may not match your seat; that's its limit, not yours.`;
    $('resSub').textContent = why;
    $('resConfText').textContent = "An honest instrument sometimes has to decline. Answer more prompts, or retake it against an episode from work where you led the delivery.";
    $('resBoardHead').textContent = ""; $('resLegend').innerHTML=""; $('resBoard').innerHTML="";
    $('resCallouts').innerHTML=""; $('resInterp').textContent="";
    const mb=$('resMoreBtn');
    mb.style.display = nextUnansweredPos(0)!==-1 ? '' : 'none';
    mb.textContent = 'Answer more →';
    $('resDisclaimer').innerHTML = COPY.disclaimer;
    return;
  }

  // ---- confidence banner (evidence-consistency) ----
  const avgN = rows.reduce((a,r)=>a+r.n,0)/Math.max(1,M);
  let conf;
  if(totalAns >= 30) conf = "You answered a lot, so these bands are about as tight as this scan gets.";
  else if(totalAns >= 16) conf = "You answered a fair amount, so the bands are fairly tight. More answers would narrow them further.";
  else conf = "You answered enough to read a pattern, no more. The bands are wide on purpose, honest about how much the scan is reading from a little.";
  if(incoherentRows>0){
    conf += ` On ${incoherentRows} paradigm${incoherentRows===1?'':'s'} your own answers pointed different ways. That band stays open however much you answered, because the disagreement is the finding.`;
  }
  conf = `Based on ${totalAns} scored answer${totalAns===1?'':'s'} across ${M} of ${PARADIGMS.length} paradigms. ` + conf;
  if(naCount>0) conf += ` You left ${naCount} prompt${naCount===1?'':'s'} out (didn’t fit, or no recent example); ${naCount===1?'it':'they'} added no evidence.`;
  conf += " The instinct side reads your recent defaults, not only what you did inside this one episode.";
  $('resConfText').textContent = conf;
  const moreBtn=$('resMoreBtn');
  const moreLeft = nextUnansweredPos(0)!==-1;
  moreBtn.style.display = (moreLeft && totalAns<30) ? '' : 'none';
  moreBtn.textContent = totalAns<16 ? 'Answer more to narrow the bands →' : 'Answer more to tighten these →';

  // ---- headline + subhead ----
  // A directional verdict needs a real SHARE of material gaps, not a lone outlier.
  // (Some axes — e.g. analysis vs recognition — invert per domain, so an otherwise-aligned
  // leader can show one big gap. One gap out of many is "mostly fit", not a lag/run-ahead verdict.)
  const dominant = Math.max(dir.towardB, dir.towardA);
  const directionalThreshold = Math.max(2, Math.ceil(M * 0.25));
  const isDirectional = dir.material > 0 && dominant >= directionalThreshold;
  const lagging = dir.towardB > dir.towardA;
  let head, sub;
  if(central && !dm.productive){        // confused
    head = "The first gap sits <em>upstream of any paradigm</em>: you couldn’t yet tell what kind of problem this was.";
    sub = "Your answers didn’t settle on one kind of situation, and by your own account habit filled that gap rather than a deliberate read. Name the problem type first; the paradigm gaps below aren’t settled until you have.";
  } else if(central && dm.productive){  // aporetic
    head = "You <em>held the uncertainty</em> instead of forcing a frame, the harder, more mature move.";
    sub = "Your read of the situation was deliberately open: you resisted early certainty about what kind of problem this was. So “what the situation called for” shows as a range, not a point. The paradigms where your default sits outside that range are where an instinct may be pulling you to decide before the situation has told you enough.";
  } else if(dir.material===0){          // well-fit
    head = "Your paradigm and this situation are <em>closely matched.</em>";
    sub = `Read as ${dm.label}, none of your defaults sat far from what the work called for. That’s the good result: your instincts fit the situation you were actually in. Try a harder episode, ideally with someone who watched you, to stress-test the fit.`;
  } else if(isDirectional && lagging){  // lagging toward control (a real share of gaps)
    head = "This situation asked for more than <em>your habits are set up to give.</em>";
    sub = `Read as ${dm.label}, the work called for more adaptation than your default gave on ${dir.towardB} of ${M} paradigm${M===1?'':'s'}. Of everything in that episode, your own default is the piece most squarely in your hands to move.`;
  } else if(isDirectional && !lagging){ // running ahead (a real share of gaps)
    head = "Your instincts ran <em>ahead of what this situation needed.</em>";
    sub = `Read as ${dm.label}, the work called for more structure than you defaulted to on ${dir.towardA} of ${M} paradigm${M===1?'':'s'}. This is the case the scan exists to catch: adaptation isn’t free, and a ${dm.label.toLowerCase()} situation often rewards a firmer hand.`;
  } else {                              // one or two outliers: mostly fit
    const n = dir.material;
    head = "Mostly a good fit, with <em>one or two places worth a look.</em>";
    sub = `Read as ${dm.label}, your defaults sat close to what the work called for on most paradigms. ${n===1?'One pulled apart':'A couple pulled apart'}. ${n===1?'It’s the one below':'Those are the ones below'} worth a second thought, not a wholesale change.`;
  }
  $('resHead').innerHTML = head;
  $('resSub').innerHTML = sub;

  // ---- board ----
  $('resBoardHead').textContent = central
    ? "Where your instincts sit against an open situation"
    : "Where your paradigm and your situation pulled apart";
  // legend
  $('resLegend').innerHTML = `
    <span class="lg"><span class="swatch-band"></span> where your instincts sit (wider means less certain)</span>
    <span class="lg"><span class="swatch-dot"></span> your centre of gravity</span>
    <span class="lg"><span class="swatch-mark"></span> ${central? "what the situation could have called for (a range)" : "what the situation called for"}</span>`;

  $('resBoard').innerHTML = rows.map(r=>{
    const meanX = pctX(r.mean);
    const bandLo = pctX(r.mean - r.band), bandHi = pctX(r.mean + r.band);
    const bandW = bandHi - bandLo;
    // demand marker or band
    let demMarkup;
    if(r.dem.point!=null){
      demMarkup = `<div class="demand-mark" style="left:${pctX(r.dem.point)}%;" title="what the situation called for"></div>`;
    } else {
      const lo=pctX(r.dem.band[0]), hi=pctX(r.dem.band[1]);
      demMarkup = `<div class="demand-band" style="left:${lo}%; width:${hi-lo}%;" title="range the situation could have called for"></div>`;
    }
    const material = r.gap>=20;
    const incoh = r.coh && r.coh.contradiction;
    // reading line
    let readWord;
    if(incoh) readWord = `<span class="poleword">Mixed</span>: your own answers here pointed both ways`;
    else {
      const demandPos = r.dem.point!=null ? r.dem.point : (r.dem.band[0]+r.dem.band[1])/2;
      if(!material) readWord = `<span class="poleword">Close fit</span>`;
      else if(demandPos>r.mean) readWord = `Situation leaned <span class="poleword">${r.p.poleB}</span>; you defaulted <span class="poleword">${r.p.poleA}</span>`;
      else readWord = `Situation leaned <span class="poleword">${r.p.poleA}</span>; you defaulted <span class="poleword">${r.p.poleB}</span>`;
    }
    const gapTxt = central ? `${r.n} answered` : (material ? `gap ${Math.round(r.gap)}` : `close`);
    return `
      <div class="brow">
        <div class="brow-head">
          <span class="brow-title">${r.p.title}</span>
          <span class="brow-gap ${material?'material':''}">${gapTxt}</span>
        </div>
        <div class="track">
          <div class="track-line"></div>
          <span class="track-pole a"><span class="arrow">◄</span> ${r.p.poleA}</span>
          <span class="track-pole b">${r.p.poleB} <span class="arrow">►</span></span>
          ${demMarkup}
          <div class="you-band" style="left:${bandLo}%; width:${bandW}%;"></div>
          <div class="you-dot" style="left:${meanX}%;"></div>
        </div>
        <div class="brow-read">${readWord}</div>
        <div class="brow-gloss">${r.p.poleA} = ${r.p.poleA_gloss} · ${r.p.poleB} = ${r.p.poleB_gloss}</div>
      </div>`;
  }).join('');

  // ---- callouts (only for material gaps, and never in confused-lead) ----
  const co=$('resCallouts'); co.innerHTML='';
  if(!(central && !dm.productive)){
    const material = rows.filter(r=>r.gap>=20 && !(r.coh&&r.coh.contradiction)).slice(0,3);
    if(material.length && dir.material>0){
      co.innerHTML = `<div class="callout ${dir.towardB>dir.towardA?'dom-b':'dom-a'}">
        <h3 style="margin-bottom:.5rem;">Worth a conversation</h3>
        ${material.map(r=>{
          const demandPos=r.dem.point!=null?r.dem.point:(r.dem.band[0]+r.dem.band[1])/2;
          const pull = demandPos>r.mean ? `the work asked for more ${r.p.poleB.toLowerCase()} than you brought` : `you brought more ${r.p.poleB.toLowerCase()} than the work asked for`;
          return `<p style="margin-top:.4rem;"><strong>${r.p.title}.</strong> ${pull}.</p>`;
        }).join('')}
      </div>`;
    }
  }

  // ---- interpretive reading ----
  let interp;
  if(central && !dm.productive){
    interp = "The first thing here isn’t any single paradigm gap. It’s reading the situation type before you act, and that one habit changes every gap below it.";
  } else if(central && dm.productive){
    interp = "You already do the hard part, holding uncertainty open. The live question is whether your paradigm defaults let you act inside that openness, or pull you to decide before the situation has told you enough.";
  } else if(dom==='chaotic'){
    interp = "You read this as a <strong>crisis</strong>, and in a crisis the firmer pole is often right. So the question isn’t “close every gap.” It’s which of these was a genuine misfit and which was the correct call under fire.";
  } else if(dom==='complex'){
    interp = "You read this as <strong>complex</strong>, where probing beats controlling. Each wide gap is a place your habitual pole was fighting work that wouldn’t hold still for it. There’s usually one paradigm holding the others in place.";
  } else if(dir.material===0){
    interp = "A close fit on a single episode is a good sign, not a finished answer. One situation can’t tell a real fit from a lucky one. The real test is a harder episode and a second pair of eyes: run it on the call that went badly, and have someone who watched you answer it too.";
  } else {
    interp = `You read this as <strong>${dm.label}</strong>, so some structure was doing real work, and not every gap needs closing. The open question is which gaps are genuine misfits and which are instincts that still earn their place here.`;
  }
  $('resInterp').innerHTML = interp;
}

/* ---------- static copy wiring ---------- */
function paintStatic(){
  $('introHead').textContent = COPY.introHead;
  $('introLead').innerHTML = COPY.introLead;
  $('introFit').innerHTML = COPY.introFit;
  $('introHonest').innerHTML = COPY.introHonest;
  $('introPair').innerHTML = COPY.introPair;
  $('introWho').innerHTML = COPY.introWho;
  $('introPrivacy').textContent = COPY.introPrivacy;
  $('introTime').innerHTML =
    `<span style="width:100%; margin-bottom:2px;">${COPY.introTimeLead}</span>` +
    COPY.introTime.map((e,i)=>
      `${i>0?'<span class="te-sep">·</span>':''}<span class="te"><b>${e.t}</b> <span>${e.d}</span></span>`
    ).join('');
  $('sitHead').textContent = COPY.sitHead;
  $('sitLead').textContent = COPY.sitLead;
  $('sitFine').innerHTML = COPY.sitFine;
  $('feedHead').textContent = COPY.feedHead;
  $('againBtn').textContent = COPY.againLabel;
  $('resDisclaimer').innerHTML = COPY.disclaimer;
}

/* ---------- keyboard ---------- */
function markKeying(cardId){
  const c=$(cardId); if(c) c.classList.add('keying'); state.keying=true;
}
document.addEventListener('keydown', e=>{
  if(state.phase==='situation'){
    if(e.key==='Backspace'){ sitBack(); e.preventDefault(); return; }
    const n=parseInt(e.key,10);
    if(!isNaN(n)){
      const qi=state.sitOrder[state.sitPos]; const q=CONDS[qi];
      if(n>=1 && n<=q.options.length){ markKeying('sitCard'); answerSituation(qi, n-1); e.preventDefault(); }
    }
  } else if(state.phase==='feed'){
    const k=e.key.toLowerCase();
    const key=SERVE[state.feedPos]; if(!key) return;
    const aFirst = poleOnTop(key);
    const topPole = aFirst ? 'a' : 'b', bottomPole = aFirst ? 'b' : 'a';
    let choice=null;
    // keys map to POSITION, then resolve to pole (so randomised order isn't defeated by muscle memory)
    if(e.key==='1'||e.key==='ArrowUp') choice=topPole;
    else if(e.key==='2') choice=bottomPole;
    else if(e.key==='3'||e.key==='ArrowDown'||k==='m') choice='mid';
    else if(e.key==='0'||k==='n') choice='na';
    if(choice){ markKeying('feedCard'); answerFeed(key, choice); e.preventDefault(); }
    else if(e.key==='Enter' && canReport()){ goResult(); e.preventDefault(); }
    else if(e.key==='Backspace'){ feedBack(); e.preventDefault(); }
  } else if(state.phase==='intro' && (e.key==='Enter'||e.key===' ')){
    beginScan(); e.preventDefault();
  }
});

/* ---------- flow control ---------- */
function beginScan(){ initSituation(); renderSituation(); showPanel('situation'); }
function restart(){
  state.sitAnswers=[]; state.sitPos=0; state.domain=null;
  state.feedPos=0; state.answers={}; state.answeredList=[];
  showPanel('intro');
}

/* ---------- test hook (harmless in prod; used only by smoke test) ---------- */
window.__gs = {
  state,
  domainOptionIndex(want){ // index of the current situation option whose domain===want, else -1
    const qi=state.sitOrder[state.sitPos]; const q=CONDS[qi];
    return q.options.findIndex(o=>o.domain===want);
  },
  phase(){ return state.phase; },
  domain(){ return state.domain; },
  canReport, reportableAxes,
  // test helper: which position-key ('1'=top / '2'=bottom) selects the given pole on the current feed question
  keyForPole(pole){ const key=SERVE[state.feedPos]; if(!key) return null; const aTop=poleOnTop(key); if(pole==='a') return aTop?'1':'2'; if(pole==='b') return aTop?'2':'1'; return '3'; },
  currentFeedKey(){ return SERVE[state.feedPos]; },
  poleOnTop
};

/* ---------- boot ---------- */
paintStatic();
$('startBtn').addEventListener('click', beginScan);
$('seeResultBtn').addEventListener('click', ()=>{ if(canReport()) goResult(); });
$('feedBackBtn').addEventListener('click', feedBack);
$('sitBackBtn').addEventListener('click', sitBack);
$('againBtn').addEventListener('click', restart);
$('resMoreBtn').addEventListener('click', ()=>{
  const p=nextUnansweredPos(0); if(p===-1) return;
  state.feedPos=p; renderFeedProgress(); renderFeedCard(); updateStopBar(); showPanel('feed');
});

})();
</script>
